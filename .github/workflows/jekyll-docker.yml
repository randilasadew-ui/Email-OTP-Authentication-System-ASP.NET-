nname: Run C# and Check HTML

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '7.0'

    - name: Build C# code
      run: dotnet build

    - name: Run C# program
      run: dotnet run

    - name: Check HTML file exists
      run: |
        if [ -f index.html ]; then
          echo "HTML file found"
        else
          echo "HTML file missing"
          exit 1
        fi
